id: 01_gcp_kv
namespace: training_analytics

tasks:
  - id: set_project_id
    type: io.kestra.plugin.core.kv.Set
    key: GCP_PROJECT_ID
    value: ethereal-bison-491017-d8
    overwrite: true

  - id: set_bucket_name
    type: io.kestra.plugin.core.kv.Set
    key: GCP_BUCKET_NAME
    value: "athlete-analytics-terra-bucket" #"intervals-training-kestra-bucket"
    overwrite: true

  - id: set_dataset
    type: io.kestra.plugin.core.kv.Set
    key: GCP_DATASET
    value: athlete_training_dataset # athlete_training_kestra_dataset
    overwrite: true

  - id: set_location
    type: io.kestra.plugin.core.kv.Set
    key: GCP_LOCATION
    value: us-central1
    overwrite: true